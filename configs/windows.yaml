  direction_threshold_m: 1.0
  long_pass_threshold_m: 30.0
  directness_formula: sum_positive_longitudinal_displacement_over_sum_pass_length
  version: pass_style_metric_coordinates_v1
rate_contract_version: interval_rate_reliability_v1
